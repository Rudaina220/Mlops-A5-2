name: MLOps Validation and Deploy Pipeline

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    name: Validate Model
    runs-on: [self-hosted, windows, x64]

    env:
      MLFLOW_TRACKING_URI: ${{ secrets.mlflow_uri }}
      KOOFR_USER: ${{ secrets.kfoor_user }}
      KOOFR_PASS: ${{ secrets.kfoor_pass }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure DVC remote authentication
        shell: powershell
        run: |
          dvc remote modify --local origin user "$env:KOOFR_USER"
          dvc remote modify --local origin password "$env:KOOFR_PASS"

      - name: Pull dataset with DVC
        shell: powershell
        run: |
          dvc pull

      - name: Run training
        shell: powershell
        run: |
          python train.py

      - name: Verify model_info.txt exists
        shell: powershell
        run: |
          if (!(Test-Path "model_info.txt")) {
            Write-Host "model_info.txt not found"
            exit 1
          }
          Write-Host "model_info.txt content:"
          Get-Content model_info.txt

      - name: Upload model_info.txt artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-info
          path: model_info.txt

  deploy:
    name: Deploy Model
    needs: validate
    runs-on: [self-hosted, windows, x64]

    env:
      MLFLOW_TRACKING_URI: ${{ secrets.mlflow_uri }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download model_info.txt artifact
        uses: actions/download-artifact@v4
        with:
          name: model-info

      - name: Show downloaded file
        shell: powershell
        run: |
          Get-ChildItem
          Get-Content model_info.txt

      - name: Check accuracy threshold
        shell: powershell
        run: |
          python check_threshold.py

      - name: Mock Build
        shell: powershell
        run: |
          $runid = Get-Content model_info.txt
          Write-Host "Building Docker image for Run ID: $runid"

      - name: Docker build
        shell: powershell
        run: |
          $runid = Get-Content model_info.txt
          docker build --build-arg RUN_ID=$runid -t mlops-model:latest .
