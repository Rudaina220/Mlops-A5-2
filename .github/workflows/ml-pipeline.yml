name: MLOps Validation and Deploy Pipeline

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    name: Validate Model
    runs-on: ubuntu-latest

    env:
      MLFLOW_TRACKING_URI: ${{ secrets.mlflow_uri }}
      KOOFR_USER: ${{ secrets.kfoor_user }}
      KOOFR_PASS: ${{ secrets.kfoor_pass }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system tools
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install dvc mlflow

      - name: Configure DVC remote authentication
        run: |
          dvc remote modify --local origin user "$KOOFR_USER"
          dvc remote modify --local origin password "$KOOFR_PASS"

      - name: Pull dataset with DVC
        run: dvc pull

      - name: Run training
        run: python train.py

      - name: Verify model_info.txt exists
        run: |
          test -f model_info.txt || (echo "model_info.txt not found" && exit 1)
          echo "model_info.txt content:"
          cat model_info.txt

      - name: Upload model_info.txt artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-info
          path: model_info.txt

  deploy:
    name: Deploy Model
    runs-on: ubuntu-latest
    needs: validate

    env:
      MLFLOW_TRACKING_URI: ${{ secrets.mlflow_uri }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow

      - name: Download model_info.txt artifact
        uses: actions/download-artifact@v4
        with:
          name: model-info

      - name: Show downloaded artifact
        run: |
          echo "Downloaded files:"
          ls -la
          echo "Run ID inside model_info.txt:"
          cat model_info.txt

      - name: Check accuracy threshold
        run: python check_threshold.py

      - name: Mock Build
        run: |
          echo "Building Docker image for Run ID: $(cat model_info.txt)"

      - name: Docker build
        run: |
          docker build --build-arg RUN_ID=$(cat model_info.txt) -t mlops-model:latest .
