name: Model Validation & Deployment Pipeline

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mlflow dvc scikit-learn pandas numpy
    
    - name: Configure DVC (mock for demo)
      run: |
        echo "data/" > .dvc/.gitignore
        mkdir -p data
        echo "mock training data" > data/train.csv
    
    - name: Pull data with DVC
      run: |
        dvc pull || echo "DVC pull completed (mock)"
    
    - name: Train model and log to MLflow
      run: |
        python train.py
    
    - name: Export MLflow Run ID
      id: mlflow-run
      run: |
        RUN_ID=$(mlflow runs list --experiment-id 0 --max-results 1 --output-table | tail -n1 | awk '{print $1}')
        echo "MLflow Run ID: $RUN_ID"
        echo $RUN_ID > model_info.txt
        echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
    
    - name: Upload model info artifact
      uses: actions/upload-artifact@v4
      with:
        name: model-info
        path: model_info.txt
        retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: validate
    if: needs.validate.result == 'success'
    env:
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download model info artifact
      uses: actions/download-artifact@v4
      with:
        name: model-info
        path: ./
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install MLflow
      run: |
        pip install mlflow
    
    - name: Check accuracy threshold
      run: |
        python check_threshold.py
    
    - name: Mock Docker Build
      if: success()
      run: |
        RUN_ID=$(cat model_info.txt)
        echo "Building Docker image for Run ID: $RUN_ID"
        echo "docker build --build-arg RUN_ID=$RUN_ID -t ml-model:$RUN_ID ."
